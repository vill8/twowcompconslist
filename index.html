<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprehensive Turtle WoW Consumables List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <img src="https://turtlecraft.gg/build/assets/turtlewow_logo_lettering-CxbXgOXB.png" alt="Turtle WoW Logo" class="logo">
        <h1>Comprehensive Turtle WoW Consumables List</h1>
    </header>

    <div class="container">
        <aside class="sidebar">
            
            <div class="control-group">
                <label for="class-select">Pick your class</label>
                <select id="class-select">
                    <option value="all">All Classes</option>
                    <option value="warrior">Warrior</option>
                    <option value="mage">Mage</option>
                    <option value="rogue">Rogue</option>
                    <option value="priest">Priest</option>
                    <option value="hunter">Hunter</option>
                    <option value="warlock">Warlock</option>
                    <option value="druid">Druid</option>
                    <option value="shaman">Shaman</option>
                    <option value="paladin">Paladin</option>
                </select>
                
            </div>

            <div class="control-group">
                <label for="role-select">Pick your role</label>
                <select id="role-select">
                    <option value="all">All Roles</option>
                    <option value="tank">Tank</option>
                    <option value="healer">Healer</option>
                    <option value="melee">Melee DPS</option>
                    <option value="ranged">Ranged DPS</option>
                </select>
            </div>

            <div class="control-group checkbox-group">
                <label for="food-checkbox">Include food</label>
                <input type="checkbox" id="food-checkbox">
            </div>
<div class="control-group checkbox-group">
    <label for="protection-checkbox">Include protective consumables</label>
    <input type="checkbox" id="protection-checkbox">
</div>
            <div class="control-group">
                <label for="search-input">Search consumables</label>
                <input type="text" id="search-input" placeholder="Search by name...">
            </div>
        </aside>

        <main class="content">
            <h2 id="table-title">Recommended Consumables</h2>
            <div class="table-container">
                <table id="consumables-table">
                    <thead>
                        <tr>
                            <th>Consumable</th>
                            <th>Effect</th>
                            <th>Duration</th>
                            <th>Persists through death</th>
                            
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
